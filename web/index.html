<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacred Composer — Compose Your Name</title>
    <meta name="description" content="Type your name. Hear its unique composition. Mathematics becomes music.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta property="og:title" content="Sacred Composer — Compose Your Name">
    <meta property="og:description" content="Every name holds a unique eternal composition. Fibonacci sequences and sacred geometry create your personal music.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Sacred Composer</h1>
        <p class="subtitle">Type your name. Hear its mathematics.</p>
    </header>

    <div class="input-group">
        <input type="text" id="seedInput" placeholder="Enter your name..."
               autocomplete="off" spellcheck="false" maxlength="64">
        <button id="generateBtn" onclick="generate()">Compose</button>
    </div>

    <div class="viz-wrap" id="vizWrap">
        <canvas id="vizCanvas" width="540" height="540"></canvas>
        <div class="viz-overlay" id="vizOverlay">
            <div class="viz-title" id="vizTitle"></div>
            <div class="viz-seed" id="vizSeed"></div>
        </div>
    </div>

    <div class="card" id="compositionCard">
        <div class="card-top">
            <div class="meta" id="compMeta"></div>
            <div class="controls">
                <button class="btn-play" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
                <button id="stopBtn" onclick="doStop()" disabled>&#9632; Stop</button>
                <button id="shareBtn" onclick="doShare()">&#128279; Share</button>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Link copied!</div>

    <footer>
        Every note traceable to mathematics &mdash; no AI, no randomness, pure pattern
    </footer>
</div>

<!-- Tone.js from CDN -->
<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.min.js"></script>
<script src="player.js"></script>
<script src="viz.js"></script>

<script>
    let currentComp = null;
    let playing = false;

    const seedInput    = document.getElementById('seedInput');
    const compCard     = document.getElementById('compositionCard');
    const compMeta     = document.getElementById('compMeta');
    const vizWrap      = document.getElementById('vizWrap');
    const vizTitle     = document.getElementById('vizTitle');
    const vizSeed      = document.getElementById('vizSeed');
    const playBtn      = document.getElementById('playBtn');
    const stopBtn      = document.getElementById('stopBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBar  = document.getElementById('progressBar');
    const toast        = document.getElementById('toast');

    seedInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') generate();
    });

    function generate() {
        const input = seedInput.value.trim();
        if (!input) { seedInput.focus(); return; }
        compose(hashString(input), input);
    }

    function compose(seed, label) {
        doStop();
        currentComp = generateComposition(seed);

        const title = label ? label : 'Composition #' + seed;
        vizTitle.textContent = title;
        vizSeed.textContent = currentComp.key + ' · ' + currentComp.tempo + ' BPM · ' + currentComp.pattern;
        vizWrap.classList.add('visible');

        compMeta.innerHTML =
            '<span class="tag">' + currentComp.noteCount + ' notes</span>' +
            '<span class="tag">~' + currentComp.durationSec + 's</span>' +
            '<span class="tag">seed ' + currentComp.seed + '</span>';

        compCard.classList.add('visible');
        playBtn.disabled = false;

        // Draw static visualization
        drawVisualization(currentComp, 0, []);

        // Update URL without reload
        if (label) {
            const url = new URL(window.location);
            url.searchParams.set('name', label);
            history.replaceState({}, '', url);
        }
    }

    function togglePlay() {
        if (playing) { doStop(); return; }
        if (!currentComp) return;

        playing = true;
        playBtn.innerHTML = '&#10074;&#10074; Pause';
        stopBtn.disabled = false;
        progressBar.classList.add('active');
        progressFill.style.width = '0%';

        playComposition(
            currentComp,
            (pct, activeNotes) => {
                progressFill.style.width = (pct * 100).toFixed(1) + '%';
                drawVisualization(currentComp, pct, activeNotes || []);
            },
            () => { resetPlayState(); }
        );
    }

    function doStop() {
        stopPlayback();
        resetPlayState();
        if (currentComp) drawVisualization(currentComp, 0, []);
    }

    function resetPlayState() {
        playing = false;
        playBtn.innerHTML = '&#9654; Play';
        playBtn.disabled = !currentComp;
        stopBtn.disabled = true;
        progressBar.classList.remove('active');
        progressFill.style.width = '0%';
    }

    function doShare() {
        const input = seedInput.value.trim();
        const url = new URL(window.location);
        if (input) url.searchParams.set('name', input);
        navigator.clipboard.writeText(url.toString()).then(() => {
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }).catch(() => {
            prompt('Copy this link:', url.toString());
        });
    }

    // Ambient idle animation loop
    let idleRaf = null;
    function idleLoop() {
        if (!playing && currentComp) {
            drawVisualization(currentComp, 0, []);
        }
        idleRaf = requestAnimationFrame(idleLoop);
    }
    idleLoop();

    // Auto-compose from URL param
    const params = new URLSearchParams(window.location.search);
    const nameParam = params.get('name');
    if (nameParam) {
        seedInput.value = nameParam;
        // Small delay so fonts/layout settle
        setTimeout(() => generate(), 100);
    } else {
        seedInput.focus();
    }
</script>

</body>
</html>
